version: 2

builds:
  - main: ./cmd/main.go
    binary: claude-profile
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/diranged/claude-profile-go/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: diranged
    name: claude-profile-go
  draft: false
  prerelease: auto
